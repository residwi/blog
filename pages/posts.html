---
layout: default
title: Posts
permalink: /posts
---

<div class="mb-8">
  <h1 class="text-2xl font-bold text-ctp-lavender mb-2">Posts</h1>
  <p class="text-ctp-subtext0 text-sm">
    Technical writing, personal experiences, and portfolio showcase
  </p>
</div>

{% if site.posts.size > 0 %}
<div class="space-y-6">
  {% for post in site.posts %}
    {% include archive-entry.html item=post truncate=30 %}
  {% endfor %}
</div>
{% else %}
<div class="text-center py-12">
  <p class="text-ctp-overlay0 text-sm">No blog posts yet.</p>
</div>
{% endif %}
