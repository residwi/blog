<!-- Search Modal -->
<div
  id="search-modal"
  class="hidden fixed inset-0 bg-ctp-overlay0/50 z-50 flex items-start justify-center pt-20"
>
  <div class="bg-ctp-base rounded-lg shadow-xl w-full max-w-2xl mx-4">
    <div class="p-4">
      <div class="flex items-center space-x-2">
        <svg
          class="w-5 h-5 text-ctp-subtext0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          ></path>
        </svg>
        <input
          type="text"
          id="search-input"
          placeholder="Search..."
          class="flex-1 bg-transparent border-none outline-none placeholder-ctp-subtext0"
        />
        <button id="search-close" class="text-ctp-subtext0 hover:text-ctp-text">
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
      </div>

      <!-- Search results -->
      <div id="search-results" class="max-h-96 overflow-y-auto">
        <!-- Results will be inserted here -->
      </div>

      <div id="search-empty" class="hidden text-center py-8 text-ctp-subtext0">
        No results found
      </div>
    </div>
  </div>
</div>
